services:
    worker:
        image: worker:orchesty-tag
        build: worker/docker
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www
        volumes:
            - ./worker/:/var/www:cached
        environment:
            # Envs for tests are load from worker/.jest/testEnvs.ts
            JEST_DOCKER: 1
            APP_ENV: debug
            TENANT_ID: ${TENANT_ID}
            CRYPT_SECRET: ${CRYPT_SECRET}
            ORCHESTY_API_KEY: ${ORCHESTY_API_KEY}
        command: sh -c 'pnpm install && pnpm run start'
        mem_limit: 1536MB
        depends_on:
            - mongo

    multi-counter:
        image: orchesty/counter:${VERSION}
        environment:
            RABBITMQ_DSN: ${RABBITMQ_DSN}
            MONGODB_DSN: ${MONGO_DSN}
            METRICS_DSN: ${METRICS_DSN}
            STARTING_POINT_DSN: ${STARTING_POINT_DSN}
        mem_limit: 64MB
        depends_on:
            - mongo
            - rabbitmq

    starting-point:
        image: orchesty/starting-point:${VERSION}
        environment:
            MONGO_DSN: ${MONGO_DSN}
            METRICS_DSN: ${METRICS_DSN}
            RABBITMQ_DSN: ${RABBITMQ_DSN}
            RABBIT_DELIVERY_MODE: 2
        ports:
            - ${DEV_IP}:82:8080
        mem_limit: 64MB
        depends_on:
            - mongo
            - rabbitmq

    topology-api:
        image: orchesty/topology-api:${VERSION}
        environment:
            DEPLOYMENT_PREFIX: ${MAIN_DB}
            GENERATOR_NETWORK: ${NETWORK_NAME}
            PLATFORM: ${PLATFORM}
            GENERATOR_PATH: /srv/topology
            PROJECT_SOURCE_PATH: ${PROJECT_SOURCE_PATH}/topology
            MONGO_DSN: ${MONGO_DSN}
        volumes:
            - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
            - ./topology:/srv/topology
        mem_limit: 128MB
        depends_on:
            - mongo

    detector:
        image: orchesty/detector:${VERSION}
        environment:
            MONGO_DSN: ${MONGO_DSN}
            METRICS_DSN: ${METRICS_DSN}
            RABBITMQ_DSN: ${RABBITMQ_DSN}
            PLATFORM: ${PLATFORM}
            DOCKER_NETWORK: ${NETWORK_NAME}
        mem_limit: 128MB
        depends_on:
            - mongo
            - rabbitmq

    cron-api:
        image: orchesty/cron:${VERSION}
        environment:
            MONGO_DSN: ${MONGO_DSN}
            MONGO_COLLECTION: Cron
            STARTING_POINT_DSN: ${STARTING_POINT_DSN}
        mem_limit: 32MB
        depends_on:
            - mongo

    limiter:
        image: orchesty/limiter:${VERSION}
        environment:
            LIMITER_ADDR: 0.0.0.0:3333
            RABBITMQ_DSN: ${RABBITMQ_DSN}
            MONGO_DSN: ${MONGO_DSN}
            METRICS_DSN: ${METRICS_DSN}
        mem_limit: 32MB
        depends_on:
            - mongo
            - rabbitmq

    worker-api:
        image: orchesty/worker-api:${VERSION}
        environment:
            MONGODB_DSN: ${MONGO_DSN}
            METRICS_DB: metrics
        mem_limit: 64MB
        depends_on:
            - mongo

    frontend:
        image: orchesty/frontend:${VERSION}
        environment:
            VITE_BACKEND_URL: ${BACKEND_URL}
            VITE_STARTING_POINT_URL: ${STARTING_POINT_URL}
        ports:
            - ${DEV_IP}:80:80
        mem_limit: 32MB

    backend:
        image: orchesty/backend:${VERSION}
        ports:
            - ${DEV_IP}:81:80
        environment:
            BACKEND_URL: ${BACKEND_URL}/
            FRONTEND_URL: ${FRONTEND_URL}/
            RABBITMQ_DSN: ${RABBITMQ_DSN}
            MONGODB_DSN: ${MONGO_DSN}
            MONGODB_DB: ${MAIN_DB}
            METRICS_DSN: ${METRICS_DSN}
            METRICS_DB: metrics
            CRON_DSN: cron-api:8080
            STARTING_POINT_URL: ${STARTING_POINT_DSN}
            WORKER_API: http://worker-api:8080/
            TOPOLOGY_API_DSN: topology-api:8080
            DOCKER_PF_BRIDGE_IMAGE: orchesty/bridge:${VERSION}
            JWT_KEY: ${JWT_KEY}
            INSTALLER_DIRS: '["/var/www/topology"]'
        mem_limit: 128MB
        depends_on:
            mongo:
              condition: service_healthy
            rabbitmq:
              condition: service_healthy

    mongo:
        image: mongo:8
        ports:
            - ${DEV_IP}:27017:27017
        volumes:
            - mongodb:/data/db
        mem_limit: 512MB
        healthcheck:
          test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
          interval: 30s
          timeout: 10s
          retries: 5
          start_period: 60s

    rabbitmq:
        image: rabbitmq:4-management-alpine
        ports:
            - ${DEV_IP}:15672:15672
        volumes:
            - rabbitmq:/var/lib/rabbitmq
        mem_limit: 512MB
        healthcheck:
          test: ["CMD", "rabbitmq-diagnostics", "ping"]
          interval: 30s
          timeout: 10s
          retries: 5
          start_period: 60s

volumes:
    mongodb:
    rabbitmq:

networks:
    default:
        name: ${NETWORK_NAME}
